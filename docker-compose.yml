services:

  # Ollama — local LLM server
  # Your backend talks to this for inference
  ollama:
    image: ollama/ollama:latest
    container_name: retrievex-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: retrievex-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend/data:/app/data          # uploads + vector DB persist on host
      - ./backend/logs:/app/logs          # logs persist on host
      - ./backend/models:/app/models      # LLM model files persist on host
    depends_on:
      - ollama
    restart: unless-stopped

  # React frontend served by Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: retrievex-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
